<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Rutina 💊</title>

  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#6366f1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Mi Rutina" />
  <link rel="apple-touch-icon" href="https://fav.farm/💊" />

  <!-- PWA Manifest inline -->
  <script>
    const manifest = {
      name: "Mi Rutina - Tracker de Suplementos",
      short_name: "Mi Rutina",
      description: "Tracker de suplementos y medicación",
      start_url: "/",
      display: "standalone",
      background_color: "#f8f9fa",
      theme_color: "#6366f1",
      icons: [{ src: "https://fav.farm/💊", sizes: "192x192", type: "image/png" }]
    };
    const blob = new Blob([JSON.stringify(manifest)], { type: "application/json" });
    const link = document.createElement("link");
    link.rel = "manifest";
    link.href = URL.createObjectURL(blob);
    document.currentScript.after(link);
  </script>

  <!-- React + Babel -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f8f9fa; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    input:focus { border-color: #6366f1 !important; box-shadow: 0 0 0 3px rgba(99,102,241,.1); }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 99px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const ICONS = ["💊","🧴","💉","🌿","🫧","⚗️","🔬","🩺"];
    const TIMES = ["Mañana","Mediodía","Tarde","Noche","Con comida","En ayunas"];
    const DAY_NAMES = ["D","L","M","M","J","V","S"];

    const todayStr = () => new Date().toISOString().split("T")[0];

    function calcStreak(log, items) {
      let s = 0, d = new Date();
      for (let i = 0; i < 30; i++) {
        const k = d.toISOString().split("T")[0];
        const dayItems = items.filter(it => it.days.includes(d.getDay()));
        if (!dayItems.length) { d.setDate(d.getDate() - 1); continue; }
        const done = dayItems.every(it => log[k]?.[it.id]);
        if (done) { s++; d.setDate(d.getDate() - 1); } else break;
      }
      return s;
    }

    function App() {
      const [items, setItems] = useState(() => {
        try { return JSON.parse(localStorage.getItem("supp_items") || "[]"); } catch { return []; }
      });
      const [log, setLog] = useState(() => {
        try { return JSON.parse(localStorage.getItem("supp_log") || "{}"); } catch { return {}; }
      });
      const [view, setView] = useState("today");
      const [form, setForm] = useState({ name:"", dose:"", time:"Mañana", icon:"💊", note:"", days:[0,1,2,3,4,5,6] });
      const [editId, setEditId] = useState(null);
      const [toast, setToast] = useState("");

      useEffect(() => { localStorage.setItem("supp_items", JSON.stringify(items)); }, [items]);
      useEffect(() => { localStorage.setItem("supp_log", JSON.stringify(log)); }, [log]);

      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(""), 2000); };
